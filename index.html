<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Easy Theme Builder + Preview</title>

<style>
body {
    font-family: Arial, sans-serif;
    background: #f4f6f9;
    padding: 20px;
}

.wrapper {
    display: flex;
    gap: 20px;
    flex-wrap: wrap;
    justify-content: center;
}

.panel, .preview {
    background: white;
    border: 1px solid #ddd;
    border-radius: 10px;
    padding: 15px;
    width: 320px;
}

label {
    display: flex;
    justify-content: space-between;
    margin: 10px 0;
    font-size: 14px;
}

input {
    width: 130px;
}

button {
    width: 100%;
    margin-top: 12px;
    padding: 10px;
    border: none;
    background: #007bff;
    color: white;
    border-radius: 8px;
    cursor: pointer;
}

/* ───── Preview Chat ───── */
.preview {
    display: flex;
    flex-direction: column;
    height: 420px;
}

.chat-box {
    flex: 1;
    padding: 10px;
    background: var(--chat-bg);
    border-radius: 8px;
    overflow: hidden;
}

.msg {
    max-width: 80%;
    padding: 8px 10px;
    margin: 6px 0;
    border-radius: 12px;
    font-size: 13px;
}

.sent {
    background: var(--bubble-sent);
    color: white;
    margin-left: auto;
}

.recv {
    background: var(--bubble-received);
    color: var(--text-color);
}

.footer {
    margin-top: 8px;
    font-size: 12px;
    color: #666;
}

/* CSS variables (live updated) */
:root {
    --chat-bg: #ffffff;
    --bubble-sent: #007bff;
    --bubble-received: #f1f0f0;
    --text-color: #333333;
}
</style>
</head>

<body>

<div class="wrapper">

<!-- ───── Controls ───── -->
<div class="panel">
    <h3>Easy Theme Builder</h3>

    <label>Theme Name:
        <input id="name" value="my-theme">
    </label>

    <label>Chat BG:
        <input type="color" id="chat" value="#ffffff">
    </label>

    <label>Main BG:
        <input type="color" id="bg" value="#f4f6f9">
    </label>

    <label>Text:
        <input type="color" id="text" value="#333333">
    </label>

    <label>Sent Bubble:
        <input type="color" id="sent" value="#007bff">
    </label>

    <label>Received Bubble:
        <input type="color" id="recv" value="#f1f0f0">
    </label>

    <button onclick="downloadTheme()">Download Theme</button>
</div>

<!-- ───── Preview ───── -->
<div class="preview" id="preview">
    <h4>Live Preview</h4>

    <div class="chat-box" id="chatBox">
        <div class="msg recv">Hello 👋</div>
        <div class="msg sent">Yo this is my theme</div>
        <div class="msg recv">Looks good!</div>
    </div>

    <div class="footer">Preview updates instantly</div>
</div>

</div>

<script>
const root = document.documentElement;

/* ───── Live update ───── */
function update() {
    root.style.setProperty("--chat-bg", chat.value);
    root.style.setProperty("--bubble-sent", sent.value);
    root.style.setProperty("--bubble-received", recv.value);
    root.style.setProperty("--text-color", text.value);

    document.body.style.background = bg.value;
}

document.querySelectorAll("input").forEach(i => {
    i.addEventListener("input", update);
});

/* ───── Download theme ───── */
function downloadTheme() {
    const name = document.getElementById("name").value || "theme";

    const css =
`html[data-theme="${name}"] {
    --bg-color: ${bg.value};
    --chat-bg: ${chat.value};
    --text-color: ${text.value};
    --bubble-sent: ${sent.value};
    --bubble-received: ${recv.value};
}`;

    const blob = new Blob([css], { type: "text/plain" });
    const a = document.createElement("a");

    a.href = URL.createObjectURL(blob);
    a.download = name + ".txt";
    a.click();
}

/* init */
update();
</script>

</body>
</html>
