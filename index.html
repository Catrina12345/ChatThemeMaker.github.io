<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Easy Theme Builder</title>

<style>
body {
    font-family: Arial;
    background: #f4f6f9;
    padding: 20px;
}

.box {
    max-width: 500px;
    margin: auto;
    background: white;
    padding: 20px;
    border-radius: 10px;
    border: 1px solid #ddd;
}

label {
    display: flex;
    justify-content: space-between;
    margin: 12px 0;
    font-size: 14px;
}

input {
    width: 140px;
}

button {
    width: 100%;
    padding: 10px;
    margin-top: 15px;
    background: #007bff;
    color: white;
    border: none;
    border-radius: 8px;
    cursor: pointer;
}
</style>
</head>

<body>

<div class="box">
    <h2>Easy Theme Builder</h2>

    <label>Theme Name:
        <input type="text" id="name" value="my-theme">
    </label>

    <label>Main Background:
        <input type="color" id="bg" value="#f4f6f9">
    </label>

    <label>Chat Background:
        <input type="color" id="chat" value="#ffffff">
    </label>

    <label>Text Color:
        <input type="color" id="text" value="#333333">
    </label>

    <label>Sent Bubble:
        <input type="color" id="sent" value="#007bff">
    </label>

    <label>Received Bubble:
        <input type="color" id="recv" value="#f1f0f0">
    </label>

    <button onclick="download()">Download Theme</button>
</div>

<script>
function download() {
    const name = document.getElementById("name").value || "theme";

    const css =
`html[data-theme="${name}"] {
    --bg-color: ${bg.value};
    --chat-bg: ${chat.value};
    --text-color: ${text.value};
    --bubble-sent: ${sent.value};
    --bubble-received: ${recv.value};
}`;

    const blob = new Blob([css], { type: "text/plain" });
    const a = document.createElement("a");

    a.href = URL.createObjectURL(blob);
    a.download = name + ".txt";
    a.click();
}
</script>

</body>
</html>
